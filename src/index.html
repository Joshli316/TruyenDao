  <script>
    (function() {
      try {
        // Clean-URL → hash bootstrap: if a crawler or shared link hits /research/timeline,
        // CF Pages serves index.html via _redirects; map the path back into the hash router.
        var p = window.location.pathname;
        if (p && p !== '/' && p !== '/index.html' && !window.location.hash) {
          window.location.replace('/#' + p + window.location.search);
          return;
        }
        var l = localStorage.getItem('truyendao-lang');
        if (l === 'vi') document.documentElement.lang = 'vi';
        var theme = localStorage.getItem('truyendao-theme');
        if (!theme) theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#F4ECDC');
        }
      } catch (e) {}
    })();
  </script>
  <script type="module" src="./ts/app.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
